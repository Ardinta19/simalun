name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Hindari workflow numpuk saat seseorang push beruntun ke branch yang sama.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Code Style (Pint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Pint --dirty butuh history untuk diff-kan dengan base branch.
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          tools: composer:v2

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: vendor-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: vendor-${{ runner.os }}-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Pint (cek file yang berubah saja)
        run: ./vendor/bin/pint --test --dirty

  test:
    name: PHPUnit
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv, pdo, pdo_sqlite, gd, dom, fileinfo
          coverage: none
          tools: composer:v2

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: vendor-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: vendor-${{ runner.os }}-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Siapkan .env testing
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Jalankan test
        run: php artisan test
